Notfall Papa<\u002Fspan><input data-path=\"family.emPapa\" oninput=\"{{ onField }}\" style=\"flex:1;border:none;border-bottom:1px dotted #CBB79B;background:transparent;padding:5px 2px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-size:13px;color:#9A8975;min-width:90px\">Weitere<\u002Fspan><input data-path=\"family.emMore\" oninput=\"{{ onField }}\" style=\"flex:1;border:none;border-bottom:1px dotted #CBB79B;background:transparent;padding:5px 2px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Profil (Persönliche Daten / Gesundheit / Schule / Allergien) -->\n      <sc-if value=\"{{ famProfil }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:26px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"text-align:center;margin-bottom:6px\"><div style=\"font-family:'Parisienne',cursive;font-size:40px;color:#B07A4C;line-height:1\">Persönliche Daten<\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:18px;color:#8A6A4F\">Alles Wichtige zu einem Familienmitglied<\u002Fdiv><\u002Fdiv>\n        <div class=\"no-print\" style=\"display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0 6px\">\n          <sc-for list=\"{{ memberPicker }}\" as=\"m\" hint-placeholder-count=\"2\">\n            <button data-id=\"{{ m.id }}\" onclick=\"{{ pickProfMember }}\" style=\"{{ m.style }}\"><span style=\"width:12px;height:12px;border-radius:50%;background:{{ m.solid }};display:inline-block;margin-right:7px;vertical-align:middle\"><\u002Fspan>{{ m.name }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-for list=\"{{ profSections }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"margin-top:18px\">\n            <div style=\"background:#F6E4D6;border-radius:10px;padding:9px 14px;font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:#8A6A4F\">♡ {{ s.title }}<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:8px 22px;padding:14px 6px 4px\">\n              <sc-for list=\"{{ s.fields }}\" as=\"f\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:baseline;gap:8px\"><span style=\"font-size:13px;color:#9A8975;min-width:120px\">{{ f.label }}<\u002Fspan><input data-path=\"{{ f.path }}\" oninput=\"{{ onField }}\" style=\"flex:1;border:none;border-bottom:1px dotted #CBB79B;background:transparent;padding:5px 2px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Familienregeln -->\n      <sc-if value=\"{{ famRegeln }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:26px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Parisienne',cursive;font-size:42px;color:#B07A4C;line-height:1\">Familienregeln<\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A6A4F;margin-top:4px\">Klare, liebevolle Regeln geben Orientierung und Sicherheit.<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:16px;padding:18px;margin-top:18px\">\n          <div style=\"text-align:center;font-size:15px;font-weight:700;color:#8A7A66;margin-bottom:12px\">Unsere Familienregeln<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <sc-for list=\"{{ rulesList }}\" as=\"r\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"width:26px;height:26px;border-radius:50%;background:#FBEFE2;border:1px solid rgba(176,138,96,.35);display:flex;align-items:center;justify-content:center;font-size:13px;color:#B07A4C;flex:none\">{{ r.n }}<\u002Fspan><input data-path=\"{{ r.path }}\" oninput=\"{{ onField }}\" style=\"flex:1;border:none;border-bottom:1px dotted #CBB79B;background:transparent;padding:5px 2px;font-size:15px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:14px\">\n          <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:16px\"><div style=\"font-size:14px;font-weight:700;color:#8A7A66;margin-bottom:8px\">So sprechen wir miteinander<\u002Fdiv><textarea data-path=\"rules.sprechen\" oninput=\"{{ onField }}\" rows=\"4\" style=\"width:100%;border:none;background:transparent;font-size:14px;color:#5E4D3D;outline:none;line-height:1.9;background-image:repeating-linear-gradient(transparent,transparent 26px,#E9DAC4 26px,#E9DAC4 27px)\"><\u002Ftextarea><\u002Fdiv>\n          <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:16px\"><div style=\"font-size:14px;font-weight:700;color:#8A7A66;margin-bottom:8px\">Unser Familienmotto<\u002Fdiv><textarea data-path=\"rules.motto\" oninput=\"{{ onField }}\" rows=\"4\" style=\"width:100%;border:none;background:transparent;font-size:14px;color:#5E4D3D;outline:none;line-height:1.9;background-image:repeating-linear-gradient(transparent,transparent 26px,#E9DAC4 26px,#E9DAC4 27px)\"><\u002Ftextarea><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:#A98E72;margin-top:18px\">Ein klarer Rahmen schenkt Halt und Verbindung. ♡<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Stärken & Kraftquellen -->\n      <sc-if value=\"{{ famStaerken }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:26px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Parisienne',cursive;font-size:38px;color:#B07A4C;line-height:1\">Stärken &amp; Kraftquellen<\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A6A4F;margin-top:4px\">Was uns ausmacht und was uns gut tut.<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:16px;margin-top:18px\">\n          <div style=\"font-size:14px;font-weight:700;color:#8A7A66;margin-bottom:10px\">Unsere Familienmitglieder &amp; ihre Stärken<\u002Fdiv>\n          <sc-for list=\"{{ strengthRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\"><span style=\"width:22px;height:22px;border-radius:50%;background:{{ r.solid }};flex:none\"><\u002Fspan><span style=\"font-size:13px;color:#5E4D3D;min-width:90px;font-weight:600\">{{ r.name }}<\u002Fspan><input data-path=\"{{ r.path }}\" oninput=\"{{ onField }}\" placeholder=\"Meine Stärken …\" style=\"flex:1;border:none;border-bottom:1px dotted #CBB79B;background:transparent;padding:5px 2px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:14px\">\n          <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:16px\"><div style=\"font-size:14px;font-weight:700;color:#8A7A66;margin-bottom:8px\">Was tut unserer Familie insgesamt gut?<\u002Fdiv><textarea data-path=\"strengths.insg\" oninput=\"{{ onField }}\" rows=\"3\" style=\"width:100%;border:none;background:transparent;font-size:14px;color:#5E4D3D;outline:none;line-height:1.9;background-image:repeating-linear-gradient(transparent,transparent 26px,#E9DAC4 26px,#E9DAC4 27px)\"><\u002Ftextarea><\u002Fdiv>\n          <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:16px\"><div style=\"font-size:14px;font-weight:700;color:#8A7A66;margin-bottom:8px\">Unsere gemeinsamen Kraftquellen<\u002Fdiv><textarea data-path=\"kraft.momente\" oninput=\"{{ onField }}\" rows=\"3\" style=\"width:100%;border:none;background:transparent;font-size:14px;color:#5E4D3D;outline:none;line-height:1.9;background-image:repeating-linear-gradient(transparent,transparent 26px,#E9DAC4 26px,#E9DAC4 27px)\"><\u002Ftextarea><\u002Fdiv>\n          <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:16px\"><div style=\"font-size:14px;font-weight:700;color:#8A7A66;margin-bottom:8px\">Unsere stärkenden Rituale<\u002Fdiv><textarea data-path=\"kraft.rituale\" oninput=\"{{ onField }}\" rows=\"3\" style=\"width:100%;border:none;background:transparent;font-size:14px;color:#5E4D3D;outline:none;line-height:1.9;background-image:repeating-linear-gradient(transparent,transparent 26px,#E9DAC4 26px,#E9DAC4 27px)\"><\u002Ftextarea><\u002Fdiv>\n          <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:16px\"><div style=\"font-size:14px;font-weight:700;color:#8A7A66;margin-bottom:8px\">Das möchten wir öfter in unseren Alltag holen<\u002Fdiv><textarea data-path=\"kraft.oefter\" oninput=\"{{ onField }}\" rows=\"3\" style=\"width:100%;border:none;background:transparent;font-size:14px;color:#5E4D3D;outline:none;line-height:1.9;background-image:repeating-linear-gradient(transparent,transparent 26px,#E9DAC4 26px,#E9DAC4 27px)\"><\u002Ftextarea><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:#A98E72;margin-top:18px\">Was uns stärkt, darf einen festen Platz bekommen. ♡<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Notizen -->\n      <sc-if value=\"{{ famNotizen }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:26px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Parisienne',cursive;font-size:42px;color:#B07A4C;line-height:1\">Notizen<\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A6A4F;margin-top:4px\">Freier Platz für Ergänzungen, Beobachtungen, Erinnerungen.<\u002Fdiv><\u002Fdiv>\n        <textarea data-path=\"notes\" oninput=\"{{ onField }}\" rows=\"18\" style=\"width:100%;margin-top:18px;border:1px solid rgba(176,138,96,.25);border-radius:14px;padding:14px 16px;font-size:15px;color:#5E4D3D;outline:none;line-height:2.1;background-color:#FFFDF9;background-image:repeating-linear-gradient(transparent,transparent 30px,#EAD9C2 30px,#EAD9C2 31px)\"><\u002Ftextarea>\n        <div style=\"text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:#A98E72;margin-top:14px\">Gut festgehalten, bestens vorbereitet. ♡<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== WERKZEUGE ===================== -->\n    <sc-if value=\"{{ isWerkzeuge }}\">\n    <div style=\"animation:hzFade .4s ease both\">\n      <div class=\"no-print\" style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px\">\n        <sc-for list=\"{{ toolTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <button data-t=\"{{ t.t }}\" onclick=\"{{ setToolTab }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Listen (Einkauf / To-do) -->\n      <sc-if value=\"{{ toolList }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:26px;max-width:640px;margin:0 auto;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Parisienne',cursive;font-size:42px;color:#B07A4C;line-height:1\">{{ listTitle }}<\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A6A4F\">Zum Abhaken &amp; Eintragen ♡<\u002Fdiv><\u002Fdiv>\n        <sc-if value=\"{{ showScope }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"no-print\" style=\"display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px\">\n          <sc-for list=\"{{ scopeChips }}\" as=\"s\" hint-placeholder-count=\"3\"><button data-k=\"{{ s.key }}\" onclick=\"{{ setScope }}\" style=\"{{ s.style }}\">{{ s.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-size:12.5px;color:#9A8975;margin-top:8px;font-style:italic\">{{ scopeNote }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;flex-direction:column;gap:4px;margin-top:18px\">\n          <sc-for list=\"{{ listItems }}\" as=\"it\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:11px;border-bottom:1px solid #EAD9C2;padding:7px 0\">\n              <input type=\"checkbox\" data-path=\"{{ it.donePath }}\" oninput=\"{{ onField }}\" style=\"width:19px;height:19px;accent-color:#C98A5E;flex:none\">\n              <input data-path=\"{{ it.textPath }}\" oninput=\"{{ onField }}\" placeholder=\"…\" style=\"flex:1;border:none;background:transparent;font-size:15px;color:#5E4D3D;outline:none\">\n              <button data-i=\"{{ it.idx }}\" onclick=\"{{ removeListItem }}\" class=\"no-print\" style=\"border:none;background:transparent;color:#D6B49A;font-size:16px;cursor:pointer\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ addListItem }}\" class=\"no-print\" style=\"margin-top:14px;width:100%;border:1px dashed rgba(176,138,96,.5);background:transparent;color:#B07A4C;border-radius:12px;padding:11px;font-size:14px;font-weight:700;cursor:pointer\">+ Eintrag hinzufügen<\u002Fbutton>\n        <div style=\"text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:#A98E72;margin-top:14px\">Kleine Schritte, große Wirkung. ♡<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Gedankenparkplatz -->\n      <sc-if value=\"{{ toolGedanken }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:26px;max-width:760px;margin:0 auto;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Parisienne',cursive;font-size:40px;color:#B07A4C;line-height:1\">Gedankenparkplatz<\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A6A4F\">Alles raus aus dem Kopf – hier ist Platz dafür.<\u002Fdiv><\u002Fdiv>\n        <sc-if value=\"{{ showScopeG }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"no-print\" style=\"display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px\">\n          <sc-for list=\"{{ scopeChipsG }}\" as=\"s\" hint-placeholder-count=\"3\"><button data-k=\"{{ s.key }}\" onclick=\"{{ setScope }}\" style=\"{{ s.style }}\">{{ s.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-size:12.5px;color:#9A8975;margin-top:8px;font-style:italic\">{{ scopeNoteG }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ gLocked }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:18px;border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:28px 20px;text-align:center;background:#FBEFE2\">\n          <div style=\"font-size:30px;color:#C9A98C\">🔒<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#7A6248;margin:6px 0 16px\">Der Gedankenparkplatz von <b>{{ gLockName }}<\u002Fb> ist mit Code geschützt.<\u002Fdiv>\n          <input id=\"hzgpin\" type=\"password\" inputmode=\"numeric\" placeholder=\"Code\" style=\"width:170px;text-align:center;letter-spacing:.3em;border:1px solid rgba(176,138,96,.4);border-radius:12px;background:#FFFDF9;padding:11px;font-size:17px;color:#5E4D3D;outline:none\">\n          <sc-if value=\"{{ gPinErr }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"color:#C97A66;font-size:13px;margin-top:8px\">Code stimmt nicht.<\u002Fdiv><\u002Fsc-if>\n          <div style=\"margin-top:14px\"><button onclick=\"{{ gUnlock }}\" style=\"border:none;background:#C98A5E;color:#fff;border-radius:11px;padding:11px 26px;font-size:14px;font-weight:700;cursor:pointer\">Anzeigen<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ gUnlocked }}\">\n        <textarea data-path=\"{{ gedankenPath }}\" oninput=\"{{ onField }}\" rows=\"16\" style=\"width:100%;margin-top:18px;border:1px solid rgba(176,138,96,.25);border-radius:14px;padding:14px 16px;font-size:15px;color:#5E4D3D;outline:none;line-height:2.1;background-color:#FFFDF9;background-image:repeating-linear-gradient(transparent,transparent 30px,#EAD9C2 30px,#EAD9C2 31px)\"><\u002Ftextarea>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Herausforderungen -->\n      <sc-if value=\"{{ toolHeraus }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:26px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Parisienne',cursive;font-size:36px;color:#B07A4C;line-height:1.05\">Herausforderungen verstehen &amp; durchbrechen<\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A6A4F;margin-top:6px\">Muster erkennen und neue Wege finden. Denn wer ist schon normal? ♡<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:18px\">\n          <sc-for list=\"{{ herausBoxes }}\" as=\"b\" hint-placeholder-count=\"8\">\n            <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:16px;background:{{ b.soft }}\">\n              <div style=\"display:flex;align-items:flex-start;gap:10px;margin-bottom:10px\"><span style=\"width:24px;height:24px;border-radius:50%;background:{{ b.solid }};color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none\">{{ b.n }}<\u002Fspan><span style=\"font-size:14px;font-weight:700;color:#7A6248\">{{ b.q }}<\u002Fspan><\u002Fdiv>\n              <textarea data-path=\"{{ b.path }}\" oninput=\"{{ onField }}\" rows=\"3\" style=\"width:100%;border:none;background:transparent;font-size:14px;color:#5E4D3D;outline:none;line-height:1.9;background-image:repeating-linear-gradient(transparent,transparent 25px,rgba(176,138,96,.25) 25px,rgba(176,138,96,.25) 26px)\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:#A98E72;margin-top:18px\">Verstehen öffnet neue Wege. ♡<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Stundenpläne -->\n      <sc-if value=\"{{ toolStundenplan }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:26px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Parisienne',cursive;font-size:40px;color:#B07A4C;line-height:1\">Stundenpläne<\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A6A4F\">Fotografiere oder lade den Stundenplan jedes Kindes hoch.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:18px\">\n          <sc-for list=\"{{ timetables }}\" as=\"t\" hint-placeholder-count=\"2\">\n            <div style=\"border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:14px;background:{{ t.soft }}\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px\"><span style=\"width:24px;height:24px;border-radius:50%;background:{{ t.solid }};flex:none\"><\u002Fspan><span style=\"font-size:15px;font-weight:700;color:#5E4D3D\">{{ t.name }}<\u002Fspan><\u002Fdiv>\n              <sc-if value=\"{{ t.isImg }}\" hint-placeholder-val=\"{{ true }}\">\n                {{ t.imgNode }}\n              <\u002Fsc-if>\n              <sc-if value=\"{{ t.isFile }}\">\n                <button data-mid=\"{{ t.id }}\" onclick=\"{{ openTimetable }}\" style=\"width:100%;border:1px solid rgba(176,138,96,.35);background:#FFFDF9;color:#7A6248;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer\">📄 {{ t.fname }} öffnen<\u002Fbutton>\n              <\u002Fsc-if>\n              <div class=\"no-print\" style=\"display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center\">\n                <label style=\"flex:1;text-align:center;border:1px dashed rgba(176,138,96,.5);background:rgba(255,253,249,.7);color:#B07A4C;border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer\">📷 Foto / Dokument\n                  <input type=\"file\" accept=\"image/*,application/pdf\" data-mid=\"{{ t.id }}\" onchange=\"{{ uploadTimetable }}\" style=\"display:none\">\n                <\u002Flabel>\n                <sc-if value=\"{{ t.has }}\" hint-placeholder-val=\"{{ true }}\"><button data-mid=\"{{ t.id }}\" onclick=\"{{ removeTimetable }}\" style=\"border:none;background:transparent;color:#C98A5E;font-size:13px;cursor:pointer;text-decoration:underline\">entfernen<\u002Fbutton><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-size:12.5px;color:#9A8975;margin-top:16px;font-style:italic\">Am Handy kannst du direkt die Kamera nutzen. Große Fotos werden automatisch verkleinert.<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- ===================== TERMIN-MODAL ===================== -->\n  <sc-if value=\"{{ modalOpen }}\">\n  <div class=\"no-print\" onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(94,77,61,.34);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px\">\n    <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:460px;background:#FFFCF7;border-radius:22px;padding:26px;box-shadow:0 30px 70px -30px rgba(94,77,61,.7);animation:hzPop .25s ease both;max-height:92vh;overflow:auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n        <div style=\"font-family:'Parisienne',cursive;font-size:34px;color:#B07A4C;line-height:1\">{{ modalTitle }}<\u002Fdiv>\n        <button onclick=\"{{ closeModal }}\" style=\"border:none;background:#F3E3D2;color:#B07A4C;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:14px;margin-top:16px\">\n        <div style=\"display:flex;background:#F3E3D2;border-radius:10px;padding:3px;gap:3px\">\n          <button data-type=\"termin\" onclick=\"{{ pickType }}\" style=\"{{ typeTermin }}\">Termin<\u002Fbutton>\n          <button data-type=\"geburtstag\" onclick=\"{{ pickType }}\" style=\"{{ typeGeb }}\">🎂 Geburtstag<\u002Fbutton>\n        <\u002Fdiv>\n        <div><div style=\"font-size:12px;color:#9A8975;margin-bottom:4px\">Titel<\u002Fdiv><input value=\"{{ draft.title }}\" data-k=\"title\" onchange=\"{{ draftField }}\" placeholder=\"z. B. Zahnarzt Mia\" style=\"width:100%;border:1px solid rgba(176,138,96,.35);border-radius:10px;background:#FFFDF9;padding:10px 12px;font-size:15px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n          <div style=\"flex:1;min-width:130px\"><div style=\"font-size:12px;color:#9A8975;margin-bottom:4px\">Datum<\u002Fdiv><input type=\"date\" value=\"{{ draft.date }}\" data-k=\"date\" onchange=\"{{ draftField }}\" style=\"width:100%;border:1px solid rgba(176,138,96,.35);border-radius:10px;background:#FFFDF9;padding:9px 12px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n          <label style=\"display:flex;align-items:center;gap:7px;font-size:13px;color:#8A7A66;align-self:flex-end;padding-bottom:9px\"><input type=\"checkbox\" checked=\"{{ draft.allday }}\" data-k=\"allday\" onchange=\"{{ draftField }}\" style=\"width:17px;height:17px;accent-color:#C98A5E\">ganztägig<\u002Flabel>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showTimes }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;gap:10px\">\n          <div style=\"flex:1\"><div style=\"font-size:12px;color:#9A8975;margin-bottom:4px\">Von<\u002Fdiv><input type=\"time\" value=\"{{ draft.time }}\" data-k=\"time\" onchange=\"{{ draftField }}\" style=\"width:100%;border:1px solid rgba(176,138,96,.35);border-radius:10px;background:#FFFDF9;padding:9px 12px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font-size:12px;color:#9A8975;margin-bottom:4px\">Bis<\u002Fdiv><input type=\"time\" value=\"{{ draft.end }}\" data-k=\"end\" onchange=\"{{ draftField }}\" style=\"width:100%;border:1px solid rgba(176,138,96,.35);border-radius:10px;background:#FFFDF9;padding:9px 12px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div><div style=\"font-size:12px;color:#9A8975;margin-bottom:6px\">Für wen? <span style=\"color:#B0A089\">(mehrere möglich – z. B. Kita für Kind 1 &amp; 2)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ memberOptions }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <button data-id=\"{{ m.id }}\" onclick=\"{{ pickDraftMember }}\" style=\"{{ m.style }}\"><span style=\"width:11px;height:11px;border-radius:50%;background:{{ m.solid }};display:inline-block;margin-right:6px;vertical-align:middle\"><\u002Fspan>{{ m.name }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div><div style=\"font-size:12px;color:#9A8975;margin-bottom:6px\">Sichtbarkeit<\u002Fdiv>\n          <label style=\"display:flex;align-items:center;gap:10px;border:1px solid rgba(176,138,96,.3);border-radius:10px;padding:11px 13px;cursor:pointer;background:#FFFDF9\">\n            <input type=\"checkbox\" checked=\"{{ draft.shared }}\" data-k=\"shared\" onchange=\"{{ draftField }}\" style=\"width:18px;height:18px;accent-color:#C98A5E;flex:none\">\n            <span style=\"font-size:13.5px;color:#5E4D3D\"><b>Im Familienkalender teilen<\u002Fb><br><span style=\"font-size:12px;color:#9A8975\">Alle Familienmitglieder sehen diesen Termin.<\u002Fspan><\u002Fspan>\n          <\u002Flabel>\n          <div style=\"font-size:12px;color:#9A8975;margin:12px 0 6px\">… und/oder gezielt teilen mit (taucht bei der Person auf):<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ shareWithOptions }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <button data-id=\"{{ m.id }}\" onclick=\"{{ toggleShareWith }}\" style=\"{{ m.style }}\"><span style=\"width:11px;height:11px;border-radius:50%;background:{{ m.solid }};display:inline-block;margin-right:6px;vertical-align:middle\"><\u002Fspan>{{ m.name }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#B0A089;margin-top:8px;font-style:italic\">Ohne Familienkalender und ohne Person bleibt der Termin privat – nur du siehst ihn.<\u002Fdiv>\n        <\u002Fdiv>\n        <div><div style=\"font-size:12px;color:#9A8975;margin-bottom:4px\">Ort (optional)<\u002Fdiv><input value=\"{{ draft.ort }}\" data-k=\"ort\" onchange=\"{{ draftField }}\" style=\"width:100%;border:1px solid rgba(176,138,96,.35);border-radius:10px;background:#FFFDF9;padding:10px 12px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Fdiv>\n        <div><div style=\"font-size:12px;color:#9A8975;margin-bottom:4px\">Notiz (optional)<\u002Fdiv><textarea value=\"{{ draft.notiz }}\" data-k=\"notiz\" onchange=\"{{ draftField }}\" rows=\"2\" style=\"width:100%;border:1px solid rgba(176,138,96,.35);border-radius:10px;background:#FFFDF9;padding:10px 12px;font-size:14px;color:#5E4D3D;outline:none\"><\u002Ftextarea><\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ canExport }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:16px;background:#FBEFE2;border-radius:12px;padding:12px 14px\">\n        <div style=\"font-size:12px;color:#9A8975;margin-bottom:8px\">In Kalender übernehmen<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <a href=\"{{ gUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;border:1px solid rgba(176,138,96,.35);background:#FFFCF7;color:#7A6248;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700\">Google<\u002Fa>\n          <a href=\"{{ oUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;border:1px solid rgba(176,138,96,.35);background:#FFFCF7;color:#7A6248;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700\">Outlook<\u002Fa>\n          <button onclick=\"{{ icsDownload }}\" style=\"border:1px solid rgba(176,138,96,.35);background:#FFFCF7;color:#7A6248;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer\">.ics (Apple / Outlook App)<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;gap:10px;margin-top:18px\">\n        <sc-if value=\"{{ isEdit }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onclick=\"{{ deleteEvent }}\" style=\"border:1px solid #E5B7AC;background:transparent;color:#C97A66;border-radius:11px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer\">Löschen<\u002Fbutton>\n        <\u002Fsc-if>\n        <button onclick=\"{{ saveEvent }}\" style=\"flex:1;border:none;background:#C98A5E;color:#fff;border-radius:11px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 10px 22px -12px rgba(201,138,94,.9)\">Speichern<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== KALENDER VERBINDEN ===================== -->\n  <sc-if value=\"{{ modalConnect }}\">\n  <div class=\"no-print\" onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(94,77,61,.34);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px\">\n    <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:540px;background:#FFFCF7;border-radius:22px;padding:28px;box-shadow:0 30px 70px -30px rgba(94,77,61,.7);animation:hzPop .25s ease both;max-height:92vh;overflow:auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n        <div>\n          <div style=\"font-family:'Parisienne',cursive;font-size:36px;color:#B07A4C;line-height:1\">Kalender verbinden<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A7A66;margin-top:2px\">Eure Termine in Gmail, Outlook, Apple &amp; Co.<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeModal }}\" style=\"border:none;background:#F3E3D2;color:#B07A4C;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;flex:none\">×<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:18px;background:#FBEFE2;border:1px solid rgba(176,138,96,.3);border-radius:16px;padding:18px;text-align:center\">\n        <div style=\"font-size:14px;color:#7A6248;font-weight:700;margin-bottom:4px\">Alle Termine als Kalender-Datei<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9A8975;margin-bottom:14px\">{{ eventCount }} Termin(e) · Datei einmal importieren – sie erscheinen in deinem Kalender<\u002Fdiv>\n        <button onclick=\"{{ exportAllICS }}\" style=\"border:none;background:#C98A5E;color:#fff;border-radius:12px;padding:13px 24px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 10px 24px -12px rgba(201,138,94,.9)\">⬇ Kalender exportieren (.ics)<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"font-size:13px;font-weight:700;color:#8A7A66;margin:20px 0 10px\">So importierst du die Datei:<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;border:1px solid rgba(176,138,96,.25);border-radius:12px;padding:12px 14px\">\n          <span style=\"width:30px;height:30px;border-radius:50%;background:#F7E5DF;color:#B07A4C;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none\">G<\u002Fspan>\n          <div style=\"font-size:13px;color:#6B5847;line-height:1.5\"><b style=\"color:#5E4D3D\">Google / Gmail<\u002Fb> · calendar.google.com → Zahnrad → <i>Einstellungen → Importieren &amp; Exportieren → Importieren<\u002Fi> → die .ics-Datei wählen.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;border:1px solid rgba(176,138,96,.25);border-radius:12px;padding:12px 14px\">\n          <span style=\"width:30px;height:30px;border-radius:50%;background:#E6EDF2;color:#5B7C97;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none\">O<\u002Fspan>\n          <div style=\"font-size:13px;color:#6B5847;line-height:1.5\"><b style=\"color:#5E4D3D\">Outlook<\u002Fb> · outlook.com → Kalender → <i>Kalender hinzufügen → Aus Datei hochladen<\u002Fi> → die .ics-Datei wählen.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;border:1px solid rgba(176,138,96,.25);border-radius:12px;padding:12px 14px\">\n          <span style=\"width:30px;height:30px;border-radius:50%;background:#EBF0E3;color:#7E9367;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none\">A<\u002Fspan>\n          <div style=\"font-size:13px;color:#6B5847;line-height:1.5\"><b style=\"color:#5E4D3D\">Apple / andere<\u002Fb> · .ics-Datei einfach öffnen (Doppelklick bzw. antippen) – sie wird automatisch ins Standard-Kalender-App übernommen.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:16px;background:#EBF0E3;border-radius:12px;padding:13px 15px;font-size:12.5px;color:#6E7A5E;line-height:1.55\">\n        <b>Tipp:<\u002Fb> Einzelne Termine kannst du auch direkt beim Anlegen mit „Google / Outlook\" hinzufügen. Für eine <b>automatische Zwei-Wege-Synchronisation<\u002Fb> (Änderungen fließen laufend hin &amp; zurück) ist eine Anbindung mit Login nötig – die richten wir bei Bedarf separat über das Wix-Backend ein.\n      <\u002Fdiv>\n\n      <button onclick=\"{{ closeModal }}\" style=\"margin-top:18px;width:100%;border:1px solid rgba(176,138,96,.4);background:transparent;color:#8A6A4F;border-radius:11px;padding:11px;font-size:14px;font-weight:700;cursor:pointer\">Schließen<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== WILLKOMMEN / START (Schritt 1: Familien-Code) ===================== -->\n  <sc-if value=\"{{ modalWelcome }}\">\n  <div class=\"no-print\" style=\"position:fixed;inset:0;z-index:60;background:linear-gradient(135deg,rgba(94,77,61,.52),rgba(94,77,61,.42));backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:18px\">\n    <div style=\"width:100%;max-width:470px;background:#FFFCF7;border-radius:24px;padding:30px;box-shadow:0 30px 70px -28px rgba(94,77,61,.75);animation:hzPop .25s ease both;text-align:center;position:relative;overflow:hidden\">\n      <div style=\"position:absolute;top:16px;right:24px;color:#E7C9B6;font-size:18px\">♡<\u002Fdiv>\n      <img src=\"8fa88a89-761d-4cad-a6e1-4afd8c89ce6c\" alt=\"\" style=\"width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;box-shadow:0 8px 20px -10px rgba(138,106,79,.7)\">\n      <div style=\"font-family:'Parisienne',cursive;font-size:40px;color:#B07A4C;line-height:1\">Willkommen ♡<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:18px;color:#8A7A66;margin-top:6px;line-height:1.5\">Gib euren <b>Familien-Code<\u002Fb> ein. Auf allen Geräten derselbe Code – so seht ihr überall dieselben Termine.<\u002Fdiv>\n      <div style=\"text-align:left;font-size:12px;color:#9A8975;margin:20px 0 6px\">Euer Familien-Code<\u002Fdiv>\n      <input id=\"hzwelcode\" type=\"text\" placeholder=\"z. B. zaugg-familie-2026\" style=\"width:100%;border:1px solid rgba(176,138,96,.4);border-radius:12px;background:#FFFDF9;padding:13px 15px;font-size:16px;color:#5E4D3D;outline:none;text-align:center\">\n      <sc-if value=\"{{ syncErr }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"color:#C97A66;font-size:13px;margin-top:8px\">Bitte einen Code mit mindestens 4 Zeichen wählen.<\u002Fdiv><\u002Fsc-if>\n      <div style=\"background:#FBEFE2;border-radius:12px;padding:12px 14px;margin-top:16px;font-size:12.5px;color:#8A7A66;line-height:1.55;text-align:left\">\n        <b>Zum ersten Mal hier?<\u002Fb> Denkt euch gemeinsam einen Code aus (etwas Eigenes). <b>Schon eingerichtet?<\u002Fb> Gebt denselben Code wie auf euren anderen Geräten ein – eure Termine erscheinen automatisch.\n      <\u002Fdiv>\n      <button onclick=\"{{ welcomeConnect }}\" style=\"width:100%;margin-top:18px;border:none;background:#C98A5E;color:#fff;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 12px 26px -12px rgba(201,138,94,.9)\">Weiter →<\u002Fbutton>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:14px;color:#B0A089;margin-top:16px\">Danach wählst du nur noch dein Profil. ♡<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== FAMILIE VERBINDEN (SYNC) ===================== -->\n  <sc-if value=\"{{ modalSync }}\">\n  <div class=\"no-print\" onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;z-index:60;background:rgba(94,77,61,.34);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px\">\n    <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:480px;background:#FFFCF7;border-radius:22px;padding:28px;box-shadow:0 30px 70px -30px rgba(94,77,61,.7);animation:hzPop .25s ease both;max-height:92vh;overflow:auto\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n        <div style=\"font-family:'Parisienne',cursive;font-size:34px;color:#B07A4C;line-height:1\">Familie verbinden<\u002Fdiv>\n        <button onclick=\"{{ closeModal }}\" style=\"border:none;background:#F3E3D2;color:#B07A4C;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;flex:none\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"font-family:'Cormorant Garamond',serif;font-size:18px;color:#7A6A57;line-height:1.55;margin:12px 0 4px\">Gib auf <b>allen Geräten deiner Familie<\u002Fb> denselben Familien-Code ein – dann seht ihr überall dieselben Termine, immer aktuell. ☁<\u002Fp>\n      <div style=\"font-size:12px;color:#9A8975;margin:14px 0 6px\">Euer Familien-Code (selbst ausdenken, z. B. „zaugg-2026-herz\")<\u002Fdiv>\n      <input id=\"hzfamcode\" type=\"text\" placeholder=\"familien-code\" style=\"width:100%;border:1px solid rgba(176,138,96,.4);border-radius:12px;background:#FFFDF9;padding:12px 14px;font-size:16px;color:#5E4D3D;outline:none\">\n      <sc-if value=\"{{ syncErr }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"color:#C97A66;font-size:13px;margin-top:8px\">Bitte einen Code mit mindestens 4 Zeichen wählen.<\u002Fdiv><\u002Fsc-if>\n      <div style=\"background:#FBEFE2;border-radius:12px;padding:12px 14px;margin-top:16px;font-size:12.5px;color:#8A7A66;line-height:1.55\">\n        <b>So funktioniert's:<\u002Fb> Auf dem ersten Gerät Code eingeben &amp; verbinden – deine bisherigen Daten werden hochgeladen. Auf jedem weiteren Gerät denselben Code eingeben – die Familientermine erscheinen dort automatisch.\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;margin-top:18px\">\n        <sc-if value=\"{{ familyConnected }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onclick=\"{{ disconnectFamily }}\" style=\"border:1px solid #E5B7AC;background:transparent;color:#C97A66;border-radius:11px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer\">Trennen<\u002Fbutton>\n        <\u002Fsc-if>\n        <button onclick=\"{{ connectFamily }}\" style=\"flex:1;border:none;background:#C98A5E;color:#fff;border-radius:11px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 10px 22px -12px rgba(201,138,94,.9)\">Verbinden &amp; synchronisieren<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-if value=\"{{ familyConnected }}\"><div style=\"text-align:center;font-size:12px;color:#9A8975;margin-top:12px\">Aktueller Status: {{ syncLabel }}<\u002Fdiv><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== LOGIN / PROFIL ===================== -->\n  <sc-if value=\"{{ modalLogin }}\">\n  <div class=\"no-print\" style=\"position:fixed;inset:0;z-index:60;background:linear-gradient(135deg,rgba(94,77,61,.52),rgba(94,77,61,.42));backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:18px\">\n    <div style=\"width:100%;max-width:460px;background:#FFFCF7;border-radius:24px;padding:30px;box-shadow:0 30px 70px -28px rgba(94,77,61,.75);animation:hzPop .25s ease both;text-align:center;position:relative;overflow:hidden\">\n      <div style=\"position:absolute;top:16px;right:24px;color:#E7C9B6;font-size:18px\">♡<\u002Fdiv>\n      <sc-if value=\"{{ loggedIn }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ closeModal }}\" style=\"position:absolute;top:14px;left:16px;border:none;background:#F3E3D2;color:#B07A4C;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer\">×<\u002Fbutton><\u002Fsc-if>\n      <img src=\"8fa88a89-761d-4cad-a6e1-4afd8c89ce6c\" alt=\"\" style=\"width:62px;height:62px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;box-shadow:0 8px 20px -10px rgba(138,106,79,.7)\">\n      <div style=\"font-family:'Parisienne',cursive;font-size:38px;color:#B07A4C;line-height:1\">Wer bist du?<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A7A66;margin-top:4px\">Wähle dein Profil – du siehst deine Termine und alles, was die Familie teilt.<\u002Fdiv>\n\n      <sc-if value=\"{{ showProfiles }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:22px\">\n        <sc-for list=\"{{ loginMembers }}\" as=\"m\" hint-placeholder-count=\"2\">\n          <button data-id=\"{{ m.id }}\" onclick=\"{{ clickLogin }}\" style=\"display:flex;align-items:center;gap:12px;border:1px solid rgba(176,138,96,.3);background:#FFFDF9;border-radius:14px;padding:13px 16px;cursor:pointer;text-align:left\" style-hover=\"background:#FBEFE2;border-color:rgba(176,138,96,.5)\">\n            <span style=\"width:34px;height:34px;border-radius:50%;background:{{ m.solid }};flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px\">{{ m.initial }}<\u002Fspan>\n            <span style=\"flex:1;font-size:16px;font-weight:700;color:#5E4D3D\">{{ m.name }}<\u002Fspan>\n            <sc-if value=\"{{ m.hasPin }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#A98E72;font-size:13px\">🔒<\u002Fspan><\u002Fsc-if>\n            <span style=\"color:#C9A98C;font-size:18px\">→<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#9A8975;margin-top:16px;line-height:1.5\">Beim ersten Mal legst du einen kleinen Code fest – danach kommst nur du auf deine Ansicht.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showSetPin }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:22px\">\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#7A6248;margin-bottom:4px\">Hallo <b>{{ setPinName }}<\u002Fb> ♡<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9A8975;margin-bottom:14px;line-height:1.5\">Lege beim ersten Mal einen kleinen Zahlen-Code fest – so kommst nur du auf deine Ansicht.<\u002Fdiv>\n        <input id=\"hznewpin\" type=\"password\" inputmode=\"numeric\" placeholder=\"Code (mind. 3 Ziffern)\" style=\"width:210px;text-align:center;letter-spacing:.3em;border:1px solid rgba(176,138,96,.4);border-radius:12px;background:#FFFDF9;padding:11px;font-size:17px;color:#5E4D3D;outline:none;display:block;margin:0 auto 10px\">\n        <input id=\"hznewpin2\" type=\"password\" inputmode=\"numeric\" placeholder=\"Code wiederholen\" style=\"width:210px;text-align:center;letter-spacing:.3em;border:1px solid rgba(176,138,96,.4);border-radius:12px;background:#FFFDF9;padding:11px;font-size:17px;color:#5E4D3D;outline:none;display:block;margin:0 auto\">\n        <sc-if value=\"{{ setErrShort }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"color:#C97A66;font-size:13px;margin-top:8px\">Bitte mindestens 3 Ziffern wählen.<\u002Fdiv><\u002Fsc-if>\n        <sc-if value=\"{{ setErrMatch }}\"><div style=\"color:#C97A66;font-size:13px;margin-top:8px\">Die Codes stimmen nicht überein.<\u002Fdiv><\u002Fsc-if>\n        <div style=\"display:flex;gap:10px;justify-content:center;margin-top:16px\">\n          <button onclick=\"{{ backLogin }}\" style=\"border:1px solid rgba(176,138,96,.4);background:transparent;color:#8A6A4F;border-radius:11px;padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer\">Zurück<\u002Fbutton>\n          <button onclick=\"{{ skipPin }}\" style=\"border:1px solid rgba(176,138,96,.4);background:transparent;color:#8A6A4F;border-radius:11px;padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer\">Ohne Code<\u002Fbutton>\n          <button onclick=\"{{ saveNewPin }}\" style=\"border:none;background:#C98A5E;color:#fff;border-radius:11px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer\">Code speichern<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showPin }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:24px\">\n        <div style=\"font-size:14px;color:#7A6248;margin-bottom:10px\">PIN für <b>{{ pinForName }}<\u002Fb><\u002Fdiv>\n        <input id=\"hzpin\" type=\"password\" inputmode=\"numeric\" placeholder=\"••••\" style=\"width:170px;text-align:center;letter-spacing:.4em;border:1px solid rgba(176,138,96,.4);border-radius:12px;background:#FFFDF9;padding:12px;font-size:18px;color:#5E4D3D;outline:none\">\n        <sc-if value=\"{{ pinErr }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"color:#C97A66;font-size:13px;margin-top:8px\">PIN stimmt nicht – bitte nochmal.<\u002Fdiv><\u002Fsc-if>\n        <div style=\"display:flex;gap:10px;justify-content:center;margin-top:16px\">\n          <button onclick=\"{{ backLogin }}\" style=\"border:1px solid rgba(176,138,96,.4);background:transparent;color:#8A6A4F;border-radius:11px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer\">Zurück<\u002Fbutton>\n          <button onclick=\"{{ submitPin }}\" style=\"border:none;background:#C98A5E;color:#fff;border-radius:11px;padding:11px 26px;font-size:14px;font-weight:700;cursor:pointer\">Anmelden<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== ZUGANGSSPERRE ===================== -->\n  <sc-if value=\"{{ locked }}\">\n  <div style=\"position:fixed;inset:0;z-index:99999;background:#FBF0E4;display:flex;align-items:center;justify-content:center;padding:24px;font-family:'Nunito Sans',sans-serif\">\n    <div style=\"text-align:center;max-width:520px\">\n      <img src=\"8fa88a89-761d-4cad-a6e1-4afd8c89ce6c\" alt=\"\" style=\"width:118px;height:118px;border-radius:50%;object-fit:cover;margin:0 auto 22px;display:block;box-shadow:0 12px 34px -14px rgba(138,106,79,.7)\">\n      <div style=\"font-family:'Parisienne',cursive;font-size:clamp(40px,7vw,58px);color:#B07A4C;line-height:1\">Familienplaner<\u002Fdiv>\n      <div style=\"font-size:14px;letter-spacing:.22em;text-transform:uppercase;color:#A98E72;margin-top:12px\">Geschützter Mitglieder-Bereich<\u002Fdiv>\n      <p style=\"font-family:'Cormorant Garamond',serif;font-size:21px;line-height:1.55;color:#7A6A57;margin:22px auto 30px;max-width:440px\">Dieser Familienplaner ist Teil des Angebots und nur für angemeldete Mitglieder zugänglich. Bitte öffne ihn über deinen persönlichen Bereich.<\u002Fp>\n      <a href=\"https://www.valeriezaugg.ch\" style=\"display:inline-block;text-decoration:none;background:#C98A5E;color:#fff;border-radius:14px;padding:15px 30px;font-size:16px;font-weight:800;box-shadow:0 12px 26px -12px rgba(201,138,94,.9)\">Zu valeriezaugg.ch<\u002Fa>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:15px;color:#B0A089;margin-top:26px\">Herzensraum · Valérie Zaugg ♡<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { view:'start', famTab:'mitglieder', toolTab:'einkauf', calMode:'monat', cursor:null, profMember:null, modal:null, activeUser:null, calFilter:'all', calPerson:null, pinFor:null, pinErr:false, toolScope:null, unlocked:{}, gPinErr:false, pinSet:null, setErr:null };\n\n  PAL=[{n:'Rosé',s:'#DD9E94',f:'#F7E5DF'},{n:'Bernstein',s:'#E6BC78',f:'#F9EDD9'},{n:'Salbei',s:'#A9BD96',f:'#EBF0E3'},{n:'Himmel',s:'#9FB8CB',f:'#E6EDF2'},{n:'Lavendel',s:'#BFAED2',f:'#EDE7F3'}];\n  MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];\n  MON3=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];\n  WD=['Mo','Di','Mi','Do','Fr','Sa','So'];\n  WDLONG=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];\n\n  KEY='herzensraum.familienplaner.v1';\n  data=null;\n\n  SECRET='hz-valerie-2026-frei';\n  ALLOWED=['valeriezaugg','wixsite.com','filesusr.com','wix.com','editorx','wixstudio','parastorage'];\n  accessGranted(){\n    try{\n      const KEY='hz_geraet_frei';\n      // 1) Persönlicher Gratis-Link → Gerät dauerhaft freischalten\n      if((location.href||'').toLowerCase().indexOf(this.SECRET)!==-1){ try{localStorage.setItem(KEY,'1');}catch(e){} return true; }\n      // 2) Eingebettet (auf der bezahlten Wix-Seite) → frei + Gerät freischalten.\n      //    Die Bezahlschranke ist die Wix-Seite selbst; kein Referrer-Roulette mehr.\n      if(window.self!==window.top){ try{localStorage.setItem(KEY,'1');}catch(e){} return true; }\n      // 3) Direkt geöffnet (z. B. als Home-Bildschirm-App): frei, wenn das Gerät schon einmal legitim drin war\n      try{ if(localStorage.getItem(KEY)==='1') return true; }catch(e){}\n      return false;\n    }catch(e){ return false; }\n  }\n  getActiveUser(){ try{ return localStorage.getItem('hz_aktivprofil')||''; }catch(e){ return ''; } }\n  setActiveUser(id){ try{ if(id)localStorage.setItem('hz_aktivprofil',id); else localStorage.removeItem('hz_aktivprofil'); }catch(e){} }\n  componentDidMount(){\n    try{ localStorage.removeItem('hz_zugang'); }catch(e){}       // alten gespeicherten Zugang entfernen\n    if(!this.data) this.loadData();\n    const st={};\n    if(!this.state.cursor) st.cursor=this.todayISO();\n    const au=this.getActiveUser()||this.data.settings.activeUser;   // Profil merkt sich das Gerät (nicht die Cloud)\n    if(!this.familyCode()){ st.modal='welcome'; if(this.data.members[0]) st.profMember=this.data.members[0].id; }\n    else if(au && this.memberById(au)){\n      const m=this.memberById(au);\n      if(m.pin){ st.modal='login'; st.pinFor=au; st.profMember=au; setTimeout(()=>{const el=this.rootEl&&this.rootEl.querySelector('#hzpin'); if(el)el.focus();},400); }  // nur noch PIN eingeben\n      else { st.activeUser=au; st.profMember=au; }                   // direkt drin\n    }\n    else { st.modal='login'; if(this.data.members[0]) st.profMember=this.data.members[0].id; }\n    this.setState(st);\n    this._t=setTimeout(()=>this.syncFields(),0);\n    if(this.familyCode()) this.cloudLoad();\n    const tryLib=(n)=>{ if(window.HZ_INHALTE){ this.LIB=window.HZ_INHALTE; this.forceUpdate(); } else if(n>0){ setTimeout(()=>tryLib(n-1),150); } };\n    tryLib(60);\n  }\n  componentDidUpdate(){ this.syncFields(); }\n\n  defaultData(){ return { family:{name:'',motto:'',emAddr:'',emMama:'',emPapa:'',emMore:''}, members:[], profiles:{}, rules:{}, strengths:{}, kraft:{}, notes:'', events:[], daynotes:{}, tools:{einkauf:[],todo:[],gedanken:'',heraus:{}}, settings:{year:new Date().getFullYear()} }; }\n  loadData(){\n    try{ const r=localStorage.getItem(this.KEY); this.data = r? Object.assign(this.defaultData(), JSON.parse(r)) : this.defaultData(); }\n    catch(e){ this.data=this.defaultData(); }\n    if(!this.data.members || !this.data.members.length){ this.data.members=[{id:this.uid(),name:'',color:0,birth:'',role:'Mama'},{id:this.uid(),name:'',color:3,birth:'',role:'Papa'}]; }\n    this.normalizeData();\n  }\n  normalizeData(){\n    if(!this.data.members || !this.data.members.length){ this.data.members=[{id:this.uid(),name:'',color:0,birth:'',role:'Mama'},{id:this.uid(),name:'',color:3,birth:'',role:'Papa'}]; }\n    if(!this.data.tools) this.data.tools={einkauf:[],todo:[],gedanken:'',heraus:{}};\n    if(!this.data.settings) this.data.settings={year:new Date().getFullYear()};\n    this.data.members.forEach(m=>{ if(m.shareDefault===undefined)m.shareDefault='ask'; if(m.pin===undefined)m.pin=''; });\n    (this.data.events||[]).forEach(e=>{ if(e.owner===undefined)e.owner=e.member||''; if(e.shared===undefined)e.shared=true; if(!Array.isArray(e.members))e.members=e.member?[e.member]:[]; });\n  }\n  persist(){ this.persistLocal(); this.cloudSaveDebounced(); }\n  persistLocal(){ try{ localStorage.setItem(this.KEY, JSON.stringify(this.data)); }catch(e){} }\n  uid(){ return 'id'+Math.random().toString(36).slice(2,9); }\n\n  // ---- Cloud-Sync (Familien-Code) ----\n  SYNC_URL='https://www.valeriezaugg.ch/_functions/familie';\n  familyCode(){ try{ return localStorage.getItem('hz_familiencode')||''; }catch(e){ return ''; } }\n  setFamilyCode(code){ try{ if(code) localStorage.setItem('hz_familiencode', code); else localStorage.removeItem('hz_familiencode'); }catch(e){} }\n  cloudLoad(){\n    const code=this.familyCode(); if(!code) return Promise.resolve();\n    this.setState({syncState:'loading'});\n    return fetch(this.SYNC_URL+'?code='+encodeURIComponent(code))\n      .then(r=>r.json())\n      .then(j=>{\n        let cloud=null; if(j && j.daten){ try{ cloud=Object.assign(this.defaultData(), JSON.parse(j.daten)); }catch(e){} }\n        if(cloud && this.hasContent(cloud)){ this.data=cloud; this.normalizeData(); this.persistLocal();\n          const au=this.state.activeUser; if(au && !this.memberById(au)){ this.setActiveUser(''); this.setState({activeUser:null, modal:'login'}); } }\n        else if(this.hasContent(this.data)){ this.cloudSave(); }   // Cloud leer → lokale Daten hochladen statt überschreiben\n        this.setState({syncState:'ok', syncedAt:Date.now()}); this.forceUpdate(); })\n      .catch(()=>{ this.setState({syncState:'error'}); });\n  }\n  cloudSaveDebounced(){ if(!this.familyCode())return; clearTimeout(this._cloudT); this._cloudT=setTimeout(()=>this.cloudSave(), 1400); }\n  cloudSave(){\n    const code=this.familyCode(); if(!code) return;\n    if(!this.hasContent(this.data)) return;                 // niemals leere Standarddaten über echte Cloud-Daten schreiben\n    this.setState({syncState:'saving'});\n    return fetch(this.SYNC_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code, daten:JSON.stringify(this.data)})})\n      .then(()=>this.setState({syncState:'ok', syncedAt:Date.now()}))\n      .catch(()=>this.setState({syncState:'error'}));\n  }\n  openSync=()=>{ this.setState({modal:'sync', syncErr:false}); setTimeout(()=>{const el=this.rootEl&&this.rootEl.querySelector('#hzfamcode'); if(el)el.value=this.familyCode();},40); };\n  connectFamily=()=>{ const el=this.rootEl&&this.rootEl.querySelector('#hzfamcode'); const v=(el?el.value:'').trim(); if(!v||v.length<4){ this.setState({syncErr:true}); return; } this.setFamilyCode(v); this.setState({modal:null}); this.cloudLoad().then(()=>this.cloudSave()); };\n  welcomeConnect=()=>{ const el=this.rootEl&&this.rootEl.querySelector('#hzwelcode'); const v=(el?el.value:'').trim(); if(!v||v.length<4){ this.setState({syncErr:true}); return; } this.setFamilyCode(v); this.setState({modal:'login', syncErr:false}); this.cloudLoad().then(()=>this.cloudSave()); };\n  disconnectFamily=()=>{ this.setFamilyCode(''); this.setState({modal:null, syncState:null}); };\n\n  get(path){ const s=String(path).split('.'); let o=this.data; for(const k of s){ if(o==null)return undefined; o=o[k]; } return o; }\n  set(path,val,noRender){ const s=String(path).split('.'); let o=this.data; for(let i=0;i<s.length-1;i++){ const k=s[i]; if(o[k]==null) o[k]=/^\\d+$/.test(s[i+1])?[]:{}; o=o[k]; } o[s[s.length-1]]=val; this.persist(); if(!noRender) this.forceUpdate(); }\n  onField=(e)=>{ const el=e.target,p=el.dataset.path; if(!p)return; this.set(p, el.type==='checkbox'?el.checked:el.value, true); };\n  rootRef=(el)=>{ this.rootEl=el; };\n  syncFields(){ const r=this.rootEl; if(!r)return; r.querySelectorAll('[data-path]').forEach(el=>{ const v=this.get(el.dataset.path); if(el.type==='checkbox'){ el.checked=!!v; } else if(document.activeElement!==el){ el.value=(v==null?'':v); } }); }\n  stop=(e)=>{ e.stopPropagation(); };\n\n  // dates\n  todayISO(){ return this.toISO(new Date()); }\n  toISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  parseISO(s){ const [y,m,d]=String(s).split('-').map(Number); return new Date(y,m-1,d); }\n  addDays(iso,n){ const d=this.parseISO(iso); d.setDate(d.getDate()+n); return this.toISO(d); }\n  startOfWeek(iso){ const d=this.parseISO(iso); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return this.toISO(d); }\n  addMin(t,min){ const [h,m]=String(t||'09:00').split(':').map(Number); let v=h*60+m+min; v=((v%1440)+1440)%1440; return String(Math.floor(v/60)).padStart(2,'0')+':'+String(v%60).padStart(2,'0'); }\n  isoWeek(d){ const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3); const f=new Date(Date.UTC(t.getUTCFullYear(),0,4)); const fd=(f.getUTCDay()+6)%7; f.setUTCDate(f.getUTCDate()-fd+3); return 1+Math.round((t-f)/6048e5); }\n  seasonOf(m){ if(m<=1||m===11)return 'winter'; if(m<=4)return 'fruehling'; if(m<=7)return 'sommer'; return 'herbst'; }\n  parseBirth(s){ if(!s)return null; s=String(s).trim(); let m=s.match(/(\\d{4})-(\\d{1,2})-(\\d{1,2})/); if(m)return{month:+m[2]-1,day:+m[3]}; m=s.match(/(\\d{1,2})[.\\/\\-](\\d{1,2})/); if(m)return{day:+m[1],month:+m[2]-1}; return null; }\n\n  occursOn(e,iso){ return e.type==='geburtstag' ? (e.date&&e.date.slice(5)===iso.slice(5)) : e.date===iso; }\n  eventsOn(iso){ return (this.data.events||[]).filter(e=>this.occursOn(e,iso)).sort((a,b)=>(a.allday?'':a.time||'').localeCompare(b.allday?'':b.time||'')); }\n  memberById(id){ return (this.data.members||[]).find(m=>m.id===id); }\n  memColor(id){ const m=this.memberById(id); return (m && this.PAL[m.color%5]) || {s:'#C9A98C',f:'#F1E8DD',n:''}; }\n  evMembers(e){ if(e&&Array.isArray(e.members)&&e.members.length) return e.members; return (e&&e.member)?[e.member]:[]; }\n  evColorList(e){ return this.evMembers(e).map(id=>this.memColor(id)); }\n  evColor(e){ return this.evColorList(e)[0]||{s:'#C9A98C',f:'#F1E8DD',n:''}; }\n  evBarBg(e){ const cs=this.evColorList(e); if(!cs.length) return '#C9A98C'; if(cs.length===1) return cs[0].s; const n=cs.length; return 'linear-gradient(90deg,'+cs.map((c,i)=>c.s+' '+Math.round(i*100/n)+'% '+Math.round((i+1)*100/n)+'%').join(',')+')'; }\n  hasContent(d){ try{ return (d.members||[]).some(m=>m&&m.name&&m.name.trim())||(d.events||[]).length>0; }catch(e){ return false; } }\n\n  // nav\n  navSet=(e)=>{ this.setState({view:e.currentTarget.dataset.v, modal:null}); window.scrollTo(0,0); };\n  setFamTab=(e)=>{ this.setState({famTab:e.currentTarget.dataset.t}); };\n  setToolTab=(e)=>{ this.setState({toolTab:e.currentTarget.dataset.t}); };\n  changeMode=(e)=>{ this.setState({calMode:e.currentTarget.dataset.m}); };\n  navPrev=()=>{ this.nudge(-1); };\n  navNext=()=>{ this.nudge(1); };\n  navToday=()=>{ this.setState({cursor:this.todayISO()}); };\n  nudge(dir){ const c=this.state.cursor||this.todayISO(); if(this.state.calMode==='monat'){ const d=this.parseISO(c); d.setMonth(d.getMonth()+dir); this.setState({cursor:this.toISO(d)}); } else if(this.state.calMode==='woche'){ this.setState({cursor:this.addDays(c,7*dir)}); } else { this.setState({cursor:this.addDays(c,dir)}); } }\n  changeYear=(e)=>{ const y=Number(e.target.value); this.data.settings.year=y; this.persist(); const c=this.parseISO(this.state.cursor||this.todayISO()); this.setState({cursor:this.toISO(new Date(y,c.getMonth(),Math.min(c.getDate(),28)))}); };\n  gotoDay=(e)=>{ e.stopPropagation(); this.setState({view:'kalender',calMode:'tag',cursor:e.currentTarget.dataset.date}); window.scrollTo(0,0); };\n  doPrint=()=>{ window.print(); };\n\n  // members\n  addMember=()=>{ const used=this.data.members.map(m=>m.color); let c=0; for(let i=0;i<5;i++){ if(!used.includes(i)){c=i;break;} } this.data.members.push({id:this.uid(),name:'',color:c,birth:'',role:''}); this.persist(); this.forceUpdate(); };\n  removeMember=(e)=>{ const i=Number(e.currentTarget.dataset.mi); const m=this.data.members[i]; this.data.members.splice(i,1); if(m&&this.data.profiles)delete this.data.profiles[m.id]; if(this.state.profMember===(m&&m.id)) this.setState({profMember:this.data.members[0]?this.data.members[0].id:null}); this.persist(); this.forceUpdate(); };\n  pickColor=(e)=>{ const i=Number(e.currentTarget.dataset.mi), c=Number(e.currentTarget.dataset.ci); if(this.data.members[i]){ this.data.members[i].color=c; this.persist(); this.forceUpdate(); } };\n  pickProfMember=(e)=>{ this.setState({profMember:e.currentTarget.dataset.id}); };\n\n  // login / profiles\n  openLogin=()=>{ this.setState({modal:'login', pinFor:null, pinErr:false}); };\n  clickLogin=(e)=>{ const id=e.currentTarget.dataset.id; const m=this.memberById(id); if(m&&m.pin){ this.setState({pinFor:id, pinSet:null, pinErr:false}); setTimeout(()=>{const el=this.rootEl&&this.rootEl.querySelector('#hzpin'); if(el)el.focus();},40); } else { this.setState({pinSet:id, pinFor:null, setErr:null}); setTimeout(()=>{const el=this.rootEl&&this.rootEl.querySelector('#hznewpin'); if(el
