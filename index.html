  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Nunito Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"fb74d89f-2c36-47cc-bb6f-36979478cd8c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Nunito Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"ec10c9ab-999c-4ca8-8266-938808bf7310\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Parisienne';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e0349bff-ee5d-405f-bf17-9b9bf4209bd7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Parisienne';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"9052bc33-ecb0-491b-89ba-89dde3f52030\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"2783513e-9e9a-45fa-bfd1-de5adc8706fb\"><\u002Fscript>\n<style>\n*{box-sizing:border-box}\nhtml{-webkit-print-color-adjust:exact;print-color-adjust:exact}\nbody{margin:0;background:#FBF3E8}\ninput,textarea,select,button{font-family:inherit}\ninput::placeholder,textarea::placeholder{color:#CBB79B;font-style:italic}\ntextarea{resize:vertical}\n::-webkit-scrollbar{width:10px;height:10px}\n::-webkit-scrollbar-thumb{background:#E4D2BC;border-radius:8px}\n@keyframes hzFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n@keyframes hzPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}\n@media print{\n  .no-print{display:none!important}\n  body{background:#fff!important}\n  .hz-shell{background:#fff!important}\n  .hz-main{padding:0!important;max-width:none!important}\n  .hz-blob{display:none!important}\n  .hz-print{box-shadow:none!important;border-color:#e7d9c4!important}\n  @page{size:A4;margin:12mm}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"hz-shell\" ref=\"{{ rootRef }}\" style=\"position:relative;min-height:100vh;background:#FBF3E8;font-family:'Nunito Sans',sans-serif;color:#6B5847;overflow-x:hidden\">\n\n  <div class=\"hz-blob no-print\" style=\"position:fixed;top:-120px;left:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle at 40% 40%,rgba(233,194,126,.30),rgba(233,194,126,0) 70%);pointer-events:none;z-index:0\"><\u002Fdiv>\n  <div class=\"hz-blob no-print\" style=\"position:fixed;top:-80px;right:-140px;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(221,158,148,.26),rgba(221,158,148,0) 70%);pointer-events:none;z-index:0\"><\u002Fdiv>\n  <div class=\"hz-blob no-print\" style=\"position:fixed;bottom:-160px;left:-100px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(169,189,150,.22),rgba(169,189,150,0) 72%);pointer-events:none;z-index:0\"><\u002Fdiv>\n  <div class=\"hz-blob no-print\" style=\"position:fixed;bottom:-180px;right:-120px;width:440px;height:440px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(191,174,210,.22),rgba(191,174,210,0) 72%);pointer-events:none;z-index:0\"><\u002Fdiv>\n\n  <!-- TOPBAR -->\n  <div class=\"no-print\" style=\"position:relative;z-index:3;backdrop-filter:blur(6px);background:rgba(251,243,232,.82);border-bottom:1px solid rgba(176,138,96,.18)\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap\">\n      <img src=\"8fa88a89-761d-4cad-a6e1-4afd8c89ce6c\" alt=\"Herzensraum\" style=\"width:48px;height:48px;border-radius:50%;object-fit:cover;box-shadow:0 4px 14px -6px rgba(138,106,79,.6)\">\n      <div style=\"flex:1;min-width:140px\">\n        <div style=\"font-family:'Parisienne',cursive;font-size:26px;color:#B07A4C;line-height:.9\">Familienplaner<\u002Fdiv>\n        <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#A98E72\">im Herzensraum-Stil<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ openLogin }}\" class=\"no-print\" title=\"Profil wechseln / anmelden\" style=\"display:flex;align-items:center;gap:8px;border:1px solid rgba(176,138,96,.35);background:#FFFCF7;border-radius:22px;padding:5px 12px 5px 6px;cursor:pointer\">\n        <span style=\"width:28px;height:28px;border-radius:50%;background:{{ activeUserColor }};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex:none\">{{ activeUserInitial }}<\u002Fspan>\n        <span style=\"font-size:13px;font-weight:700;color:#7A6248\">{{ activeUserName }}<\u002Fspan>\n        <span style=\"color:#C9A98C;font-size:11px\">▾<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"{{ openSync }}\" class=\"no-print\" title=\"Familie verbinden / geräteübergreifend synchronisieren\" style=\"display:flex;align-items:center;gap:7px;border:1px solid rgba(176,138,96,.35);background:#FFFCF7;border-radius:22px;padding:7px 13px;cursor:pointer\">\n        <span style=\"width:10px;height:10px;border-radius:50%;background:{{ syncDotColor }};flex:none\"><\u002Fspan>\n        <span style=\"font-size:12.5px;font-weight:700;color:#7A6248\">☁ Familie<\u002Fspan>\n      <\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <span style=\"font-size:13px;color:#9A8975\">Jahr<\u002Fspan>\n        <select onchange=\"{{ changeYear }}\" value=\"{{ year }}\" style=\"border:1px solid rgba(176,138,96,.35);background:#FFFCF7;border-radius:10px;padding:7px 10px;font-size:14px;color:#6B5847;outline:none;cursor:pointer\">\n          <sc-for list=\"{{ yearOptions }}\" as=\"y\" hint-placeholder-count=\"5\"><option value=\"{{ y }}\">{{ y }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n        <button onclick=\"{{ doPrint }}\" title=\"Diese Seite drucken / als PDF speichern\" style=\"border:1px solid rgba(176,138,96,.35);background:#FFFCF7;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;color:#B07A4C;cursor:pointer\">⎙ Drucken<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- NAV -->\n    <div style=\"max-width:1120px;margin:0 auto;padding:0 14px 12px;display:flex;gap:8px;flex-wrap:wrap\">\n      <sc-for list=\"{{ nav }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <button data-v=\"{{ n.v }}\" onclick=\"{{ navSet }}\" style=\"{{ n.style }}\">{{ n.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hz-main\" style=\"position:relative;z-index:2;max-width:1120px;margin:0 auto;padding:24px 18px 90px\">\n\n    <!-- ===================== START ===================== -->\n    <sc-if value=\"{{ isStart }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation:hzFade .4s ease both\">\n      <div class=\"hz-print\" style=\"background:linear-gradient(135deg,#FBF2E6,#F6E7D5);border:1px solid rgba(176,138,96,.30);border-radius:24px;padding:38px 34px;box-shadow:0 18px 50px -34px rgba(138,106,79,.7);position:relative;overflow:hidden\">\n        <div style=\"position:absolute;top:18px;right:30px;color:#E7C9B6;font-size:18px\">♡<\u002Fdiv>\n        <div style=\"display:flex;gap:38px;align-items:center;flex-wrap:wrap;justify-content:center\">\n          <div style=\"position:relative;flex:none;transform:rotate(-1.6deg)\">\n            <div style=\"position:absolute;top:6px;bottom:6px;left:0;width:15px;background:linear-gradient(90deg,rgba(120,90,65,.42),rgba(120,90,65,.04));border-radius:9px 2px 2px 9px;z-index:2\"><\u002Fdiv>\n            <img src=\"5707162e-d854-4505-a02e-3b810fa45a0e\" alt=\"Familienplaner Cover\" style=\"display:block;width:min(300px,74vw);border-radius:7px 13px 13px 7px;border:1px solid rgba(176,138,96,.3);box-shadow:2px 2px 0 #efe1cd,4px 4px 0 #e7d6bf,6px 6px 0 #efe1cd,8px 8px 0 #e7d6bf,0 34px 56px -22px rgba(94,77,61,.62)\">\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:280px;max-width:440px\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <img src=\"8fa88a89-761d-4cad-a6e1-4afd8c89ce6c\" alt=\"\" style=\"width:54px;height:54px;border-radius:50%;object-fit:cover;box-shadow:0 6px 18px -8px rgba(138,106,79,.7)\">\n              <div style=\"font-family:'Parisienne',cursive;font-size:clamp(40px,7vw,58px);color:#B07A4C;line-height:.9\">Willkommen<\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1.55;color:#8A7A66;margin:14px 0 0\">Eure digitale Jahresagenda – ein warmer, erdiger Begleiter für mehr Überblick, Verbindung und Entlastung im Familienalltag. ♡<\u002Fp>\n            <div style=\"margin:20px 0 4px;display:flex;align-items:center;gap:10px;border:1px solid rgba(176,138,96,.3);border-radius:14px;padding:12px 16px;background:rgba(251,239,226,.72)\">\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#8A6A4F;white-space:nowrap\">Diese Familie gehört:<\u002Fspan>\n              <input data-path=\"family.name\" oninput=\"{{ onField }}\" placeholder=\"Familienname\" style=\"flex:1;min-width:60px;border:none;border-bottom:1px dotted #CBB79B;background:transparent;padding:6px 2px;font-size:17px;color:#5E4D3D;outline:none;font-family:'Cormorant Garamond',serif\">\n            <\u002Fdiv>\n            <div class=\"no-print\" style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:18px\">\n              <button data-v=\"kalender\" onclick=\"{{ navSet }}\" style=\"border:none;background:#C98A5E;color:#fff;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 10px 24px -12px rgba(201,138,94,.9)\">Zum Kalender →<\u002Fbutton>\n              <button onclick=\"{{ quickAdd }}\" style=\"border:1px solid rgba(176,138,96,.4);background:rgba(255,252,247,.8);color:#B07A4C;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer\">+ Termin hinzufügen<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-top:18px\">\n        <!-- Nächste Termine -->\n        <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:22px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n          <div style=\"font-family:'Parisienne',cursive;font-size:30px;color:#B07A4C;line-height:1\">Nächste Termine<\u002Fdiv>\n          <div style=\"height:1px;background:linear-gradient(90deg,rgba(176,138,96,.35),transparent);margin:10px 0 14px\"><\u002Fdiv>\n          <sc-if value=\"{{ hasUpcoming }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ upcoming }}\" as=\"e\" hint-placeholder-count=\"3\">\n                <div data-id=\"{{ e.id }}\" onclick=\"{{ chipClick }}\" style=\"display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:{{ e.soft }};cursor:pointer\">\n                  <div style=\"text-align:center;min-width:46px\">\n                    <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#A98E72\">{{ e.mon }}<\u002Fdiv>\n                    <div style=\"font-size:22px;font-weight:800;color:#7A6248;line-height:1\">{{ e.day }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"width:8px;height:38px;border-radius:6px;background:{{ e.solid }}\"><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font-weight:700;color:#5E4D3D;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ e.title }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#9A8975\">{{ e.meta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noUpcoming }}\">\n            <p style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#A98E72;font-style:italic\">Noch keine Termine eingetragen. Lege deinen ersten Termin im Kalender an. ♡<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- Familie -->\n        <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:22px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n          <div style=\"font-family:'Parisienne',cursive;font-size:30px;color:#B07A4C;line-height:1\">Unsere Familie<\u002Fdiv>\n          <div style=\"height:1px;background:linear-gradient(90deg,rgba(176,138,96,.35),transparent);margin:10px 0 14px\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <sc-for list=\"{{ memberChips }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;align-items:center;gap:11px\">\n as=\"c\" hint-placeholder-count=\"35\">\n            <div data-date=\"{{ c.iso }}\" onclick=\"{{ cellAdd }}\" style=\"{{ c.cellStyle }}\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center\">\n                <span data-date=\"{{ c.iso }}\" onclick=\"{{ gotoDay }}\" style=\"{{ c.numStyle }}\">{{ c.day }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:3px;margin-top:3px\">\n                <sc-for list=\"{{ c.events }}\" as=\"e\" hint-placeholder-count=\"0\">\n                  <div data-id=\"{{ e.id }}\" onclick=\"{{ chipClick }}\" style=\"font-size:11px;font-weight:600;color:#5E4D3D;background:{{ e.soft }};border-left:3px solid {{ e.solid }};border-radius:5px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer\">{{ e.chipLabel }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasBirthdays }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"hz-print\" style=\"background:linear-gradient(135deg,#FBE3D2,#FBEFE2);border:1.5px solid #E6B894;border-radius:18px;padding:16px 20px;margin-top:14px;box-shadow:0 12px 30px -22px rgba(201,138,94,.8)\">\n        <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n          <span style=\"font-size:20px\">🎂<\u002Fspan>\n          <div style=\"font-family:'Parisienne',cursive;font-size:26px;color:#B5673C;line-height:1\">Geburtstage diesen Monat<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:10px\">\n          <sc-for list=\"{{ birthdays }}\" as=\"b\" hint-placeholder-count=\"1\">\n            <div style=\"display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.6);border-radius:11px;padding:8px 13px\">\n              <span style=\"width:30px;height:30px;border-radius: eight:700\">KW {{ weekNo }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9A8975;margin-bottom:6px\">Wichtige Termine, Änderungen &amp; Neues – damit es sofort auffällt:<\u002Fdiv>\n        <textarea data-path=\"{{ weekHighlightPath }}\" oninput=\"{{ onField }}\" rows=\"2\" placeholder=\"z. B. Mama Spätschicht Di · Zahnarzt verschoben · Loeva neuer Schwimmkurs …\" style=\"width:100%;border:none;background:rgba(255,255,255,.55);border-radius:10px;padding:10px 12px;font-size:14px;color:#5E4D3D;outline:none;line-height:1.6;resize:vertical\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:20px;padding:16px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6)\">\n        <div style=\"display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;overflow-x:auto\">\n          <sc-for list=\"{{ weekDays }}\" as=\"d\" hint-placeholder-count=\"7\">\n            <div style=\"{{ d.colStyle }}\">\n              <div data-date=\"{{ d.iso }}\" onclick=\"{{ gotoDay }}\" style=\"text-align:center;cursor:pointer;padding-bottom:8px;border-bottom:1px solid rgba(176,138,96,.2);margin-bottom:8px\">\n                <div style=\"font-size:12px;color:#A98E72;font-weight:700\">{{ d.wd }}<\u002Fdiv>\n                <div style=\"{{ d.numStyle }}\">{{ d.day }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:5px;min-height:60px\">\n                <sc-for list=\"{{ d.events }}\" as=\"e\" hint-placeholder-count=\"0\">\n                  <div data-id=\"{{ e.id }}\" onclick=\"{{ chipClick }}\" style=\"font-size:12px;font-weight:600;color:#5E4D3D;background:{{ e.soft }};border-left:3px solid {{ e.solid }};border-radius:6px;padding:5px 7px;cursor:pointer\">\n                    <div style=\"font-size:10px;color:#9A8975\">{{ e.timeLabel }}<\u002Fdiv>{{ e.title }}\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button data-date=\"{{ d.iso }}\" onclick=\"{{ cellAdd }}\" class=\"no-print\" style=\"margin-top:8px;width:100%;border:1px dashed rgba(176,138,96,.4);background:transparent;color:#B07A4C;border-radius:8px;padding:5px;font-size:12px;cursor:pointer\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hz-print\" style=\"background:#FFFCF7;border:1px solid rgba(176,138,96,.3);border-radius:18px;padding:22px;margin-top:14px;box-shadow:0 12px 34px -26px rgba(138,106,79,.6)\">\n        <sc-if value=\"{{ hasImpulse }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\">\n          <span style=\"width:30px;height:30px;border-radius:50%;background:#EBF0E3;display:flex;align-items:center;justify-content:center;color:#7E9367;font-size:18px\">❝<\u002Fspan>\n          <div style=\"font-family:'Parisienne',cursive;font-size:26px;color:#B07A4C;line-height:1\">Impuls der Woche<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:#6B5847;line-height:1.45\">„{{ weekImpulse.q }}“<\u002Fdiv>\n        <div style=\"font-size:13px;color:#A98E72;margin-top:4px\">— {{ weekImpulse.a }}<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:16px\">\n          <div style=\"background:#FBEFE2;border-radius:12px;padding:14px\">\n            <div style=\"font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#B5764A;margin-bottom:5px\">Reflexion für die Familie<\u002Fdiv>\n            <div style=\"font-size:14px;color:#5E4D3D;line-height:1.55\">{{ weekImpulse.r }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#EBF0E3;border-radius:12px;padding:14px\">\n            <div style=\"font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#7E9367;margin-bottom:5px\">Dein persönlicher Impuls<\u002Fdiv>\n            <div style=\"font-size:14px;color:#5E4D3D;line-height:1.55\">{{ weekImpulse.p }}<\u002Fdiv>\n            <textarea data-path=\"{{ personalImpulsePath }}\" oninput=\"{{ onField }}\" rows=\"2\" placeholder=\"Festhalten, was du dazu denkst …\" style=\"width:100%;margin-top:8px;border:none;background:rgba(255,255,255,.6);border-radius:9px;padding:8px 10px;font-size:13px;color:#5E4D3D;outline:none;line-height:1.5;resize:vertical\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- TAG (Tagesplaner) -->\n      <sc-if value=\"{{ isTag }}\">\n      <div class=\"hz-print\" style=\"background:#F7EEDF url(&quot;2dd27fde-c579-45d4-879c-23a02633efcd&quot;) center top/cover;border:1px solid rgba(176,138,96,.34);border-radius:22px;padding:26px;box-shadow:0 14px 40px -30px rgba(138,106,79,.6);position:relative;overflow:hidden\">\n        <div style=\"position:absolute;top:20px;right:30px;color:#E7C9B6;font-size:20px\">☀<\u002Fdiv>\n        <div style=\"text-align:center\">\n          <div style=\"font-family:'Parisienne',cursive;font-size:46px;color:#B07A4C;line-height:1\">Tagesplaner<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:20px;color:#8A6A4F;margin-top:4px\">{{ dayLong }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasDayImpulse }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:18px;background:#EBF0E3;border-radius:14px;padding:16px 18px;display:flex;gap:12px;align-items:flex-start\">\n          <span style=\"width:30px;height:30px;border-radius:50%;background:#FFFCF7;display:flex;align-items:center;justify-content:center;color:#7E9367;font-size:17px;flex:none\">❝<\u002Fspan>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:#5E5D47;line-height:1.45\">„{{ dayImpulse.q }}“<\u002Fdiv>\n            <div style=\"font-size:12px;color:#93A37F;margin-top:3px\">— {{ dayImpulse.a }}<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#5E4D3D;margin-top:9px;line-height:1.5\"><b style=\"color:#7E9367\">Frage für heute:<\u002Fb> {{ dayImpulse.r }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:22px;margin-top:22px\">\n          <div>\n            <div style=\"font-size:13px;font-weight:700;color:#8A7A66;margin-bottom:8px\">3 Dinge, die ich heute schaffen möchte<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:18px\">\n              <sc-for list=\"{{ dayTodos }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <input type=\"checkbox\" data-path=\"{{ t.donePath }}\" oninput=\"{{ onField }}\" style=\"width:18px;height:18px;accent-color:#C98A5E\">\n                  <input data-path=\"{{ t.textPath }}\" oninput=\"{{ onField }}\" placeholder=\"…\" style=\"flex:1;border:none;border-bottom:1px dotted #CBB79B;background:transparent;padding:5px 2px;font-size:15px;color:#5E4D3D;outline:none\">\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:700;color:#8A7A66;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center\">Tagesverlauf <button onclick=\"{{ quickAdd }}\" class=\"no-print\" style=\"border:none;background:#F3E3D2;color:#B07A4C;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer\">+ Termin<\u002Fbutton><\u002Fdiv>\n            <div style=\"border:1px solid rgba(176,138,96,.2);border-radius:14px;overflow:hidden\">\n              <sc-for list=\"{{ dayHours }}\" as=\"h\" hint-placeholder-count=\"12\">\n                <div style=\"{{ h.rowStyle }}\">\n                  <div style=\"width:52px;font-size:12px;color:#A98E72;padding:6px 8px;flex:none;font-variant-numeric:tabular-nums\">{{ h.label }}<\u002Fdiv>\n                  <div style=\"flex:1;position:relative;border-left:1px solid rgba(176,138,96,.18)\">\n                    <sc-for list=\"{{ h.events }}\" as=\"e\" hint-placeholder-count=\"0\">\n                      <div data-id=\"{{ e.id }}\" onclick=\"{{ chipClick }}\" style=\"{{ e.chipStyle }}\">{{ e.label }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                    <input data-path=\"{{ h.notePath }}\" oninput=\"{{ onField }}\" style=\"width:100%;border:none;background:transparent;padding:5px 8px;font-size:13px;color:#5E4D3D;outline:none\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <div style=\"background:#FBEFE2;border-radius:14px;padding:16px\">\n              <div style=\"font-size:13px;font-weight:700;color:#8A7A66;margin-bottom:8px\">Was hat mir heute Freude gemacht?<\u002Fdiv>\n              <textarea data-path=\"{{ dayJoyPath }}\" oninput=\"{{ onField }}\" rows=\"3\" style=\"width:100%;border:none;background:transparent;border-bottom:1px dotted #CBB79B;font-size:14px;color:#5E4D3D;outline:none;line-height:1.7\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"background:#EBF0E3;border-radius:14px;padding:16px\">\n              <div style=\"font-size:13px;font-weight:700;color:#8A7A66;margin-bottom:10px;text-align:center\">Gefühlswetter des Tages<\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-around;gap:6px\">\n                <sc-for list=\"{{ moods }}\" as=\"w\" hint-placeholder-count=\"4\">\n                  <label style=\"display:fl
